<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

<title>Happy Birthday Priii 🎂</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html{
  scroll-behavior:smooth;
  -webkit-text-size-adjust:100%;
}

body{
  background:#070816;
  overflow:hidden;
  font-family:'Poppins',sans-serif;
  color:white;
  width:100%;
  min-height:100dvh;
  position:relative;
}

/* ================= STARS ================= */

#stars{
  position:fixed;
  inset:0;
  z-index:-1;
}

.star{
  position:absolute;
  background:white;
  border-radius:50%;
  animation:twinkle var(--d) infinite alternate;
}

@keyframes twinkle{
  from{opacity:0.2;}
  to{opacity:1;}
}

/* ================= SCREENS ================= */

.screen{
  position:fixed;
  inset:0;

  width:100%;
  height:100dvh;

  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;

  transition:0.6s;

  text-align:center;

  overflow-y:auto;
  overflow-x:hidden;

  padding-top:max(20px, env(safe-area-inset-top));
  padding-bottom:max(20px, env(safe-area-inset-bottom));
  padding-left:16px;
  padding-right:16px;
}

.hidden{
  opacity:0;
  pointer-events:none;
  transform:scale(0.95);
}

/* ================= FALLING TEXT ================= */

#dropping-text{
  position:fixed;
  inset:0;
  overflow:hidden;
  pointer-events:none;
}

.drop{
  position:absolute;
  top:-100px;
  font-weight:bold;
  animation:fall linear forwards;
}

@keyframes fall{
  to{
    transform:translateY(120vh) rotate(360deg);
    opacity:0;
  }
}

/* ================= COUNTDOWN ================= */

.subtitle{
  letter-spacing:4px;
  color:rgba(255,255,255,0.5);
  margin-bottom:20px;
  font-size:12px;
}

.name{
  font-size:80px;
  font-family:'Playfair Display',serif;

  background:linear-gradient(90deg,#ff5db1,#c77dff,#ffd166);

  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;

  margin-bottom:30px;
}

.timer{
  font-size:140px;
  font-weight:bold;

  background:linear-gradient(90deg,#ff5db1,#c77dff);

  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;

  animation:pulse 1s infinite;
}

@keyframes pulse{

  0%,100%{
    transform:scale(1);
  }

  50%{
    transform:scale(1.08);
  }
}

/* ================= COMMON CARD ================= */

.card,
.gallery-box,
.greeting-card,
.letter,
.popup-box{

  width:100%;
  max-width:430px;

  margin:auto;

  background:rgba(255,255,255,0.08);

  border-radius:30px;

  padding:28px;

  backdrop-filter:blur(15px);

  box-shadow:0 0 30px rgba(255,255,255,0.08);
}

/* ================= MESSAGE CARD ================= */

.avatar{
  font-size:70px;
  margin-bottom:20px;
}

.message{
  font-size:24px;
  line-height:1.6;
  font-family:'Playfair Display',serif;
  margin-bottom:30px;
}

/* ================= BUTTONS ================= */

.btn{

  border:none;

  padding:14px 35px;

  border-radius:40px;

  cursor:pointer;

  color:white;

  font-weight:bold;

  font-size:18px;

  background:linear-gradient(135deg,#ff5db1,#9b5cff);

  box-shadow:0 0 25px rgba(255,93,177,0.4);

  transition:0.3s;

  min-height:52px;

  width:auto;

  max-width:100%;
}

.btn:hover{
  transform:scale(1.05);
}

/* ================= DOTS ================= */

.dots{
  margin-top:20px;
}

.dot{

  width:10px;
  height:10px;

  background:#666;

  border-radius:50%;

  display:inline-block;
  margin:5px;
}

.active{
  width:28px;
  border-radius:20px;
  background:#ff5db1;
}

/* ================= CAKE ================= */

.cake{
  font-size:170px;
  animation:float 3s infinite ease-in-out;
}

@keyframes float{

  0%,100%{
    transform:translateY(0);
  }

  50%{
    transform:translateY(-20px);
  }
}

.banner{

  font-size:55px;

  font-family:'Playfair Display',serif;

  margin-bottom:20px;

  background:linear-gradient(90deg,#ff5db1,#ffd166,#9b5cff);

  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* ================= LETTER ================= */

.letter{
  color:white;
  line-height:1.9;
  font-family:'Playfair Display',serif;
}

/* ================= GALLERY ================= */

.gallery-box img{

  width:100%;

  max-height:65dvh;

  object-fit:cover;

  border-radius:22px;

  background:#111;

  transition:0.4s;
}

.gallery-buttons{

  display:flex;

  justify-content:center;

  align-items:center;

  gap:14px;

  margin-top:18px;

  flex-wrap:wrap;

  width:100%;
}

.arrow-btn{

  width:58px;
  height:58px;

  min-width:58px;
  min-height:58px;

  border:none;

  border-radius:50%;

  font-size:24px;

  cursor:pointer;

  color:white;

  background:linear-gradient(135deg,#ff5db1,#9b5cff);

  flex-shrink:0;

  box-shadow:0 0 18px rgba(255,93,177,0.4);
}

.photo-count{
  margin-top:15px;
  color:rgba(255,255,255,0.7);
}

/* ================= GREETING CARD ================= */

.greeting-title{

  text-align:center;

  margin-bottom:25px;

  font-size:38px;

  font-family:'Playfair Display',serif;

  background:linear-gradient(90deg,#ff5db1,#ffd166,#9b5cff);

  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.typing-text{

  color:white;

  font-size:18px;

  line-height:2;

  white-space:pre-line;

  text-align:left;
}

/* ================= POPUP ================= */

#popup{

  position:fixed;
  inset:0;

  background:rgba(0,0,0,0.7);

  display:flex;
  align-items:center;
  justify-content:center;

  opacity:0;
  pointer-events:none;

  transition:0.5s;
}

#popup.show{
  opacity:1;
  pointer-events:auto;
}

/* ================= HEART FLOAT ================= */

@keyframes floatHeart{

  from{
    transform:translateY(0) scale(1);
    opacity:1;
  }

  to{
    transform:translateY(-120vh) scale(1.8);
    opacity:0;
  }
}

/* ================= MOBILE ================= */

@media screen and (max-width:768px){

  .name{
    font-size:56px;
    line-height:1.1;
  }

  .timer{
    font-size:90px;
  }

  .banner{
    font-size:32px;
  }

  .cake{
    font-size:100px;
  }

  .message{
    font-size:20px;
  }

  .btn{
    width:100%;
    font-size:16px;
    padding:14px 18px;
  }

  .typing-text{
    font-size:16px;
    line-height:1.9;
  }

}

@media screen and (max-width:480px){

  .screen{
    padding-left:12px;
    padding-right:12px;
  }

  .name{
    font-size:44px;
  }

  .timer{
    font-size:68px;
  }

  .banner{
    font-size:26px;
  }

  .cake{
    font-size:85px;
  }

  .card,
  .gallery-box,
  .greeting-card,
  .letter{
    padding:18px;
    border-radius:22px;
  }

  .message{
    font-size:18px;
  }

  .typing-text{
    font-size:15px;
    line-height:1.8;
  }

  .greeting-title{
    font-size:28px;
  }

  .arrow-btn{
    width:52px;
    height:52px;
    font-size:22px;
  }

}

@media screen and (max-width:360px){

  .name{
    font-size:38px;
  }

  .timer{
    font-size:58px;
  }

  .banner{
    font-size:22px;
  }

  .cake{
    font-size:75px;
  }

  .typing-text{
    font-size:14px;
  }

  .btn{
    font-size:14px;
  }

}

</style>

</head>

<body>

<div id="stars"></div>
<div id="dropping-text"></div>

<!-- ================= SCREEN 1 ================= -->

<div class="screen" id="screen1">

  <div class="subtitle">
    SOMEONE CRAFTED SOMETHING MAGICAL FOR
  </div>

  <div class="name">
    Priii
  </div>

  <div class="timer" id="timer">
    05
  </div>

</div>

<!-- ================= SCREEN 2 ================= -->

<div class="screen hidden" id="screen2">

  <div class="card">

    <div class="avatar">🐰</div>

    <div class="message" id="msg">
      Our bond in three words — Sweet, Loyal & My Rock 💖
    </div>

    <button class="btn" onclick="nextMessage()">
      Next
    </button>

    <div class="dots">

      <span class="dot active"></span>
      <span class="dot"></span>
      <span class="dot"></span>

    </div>

  </div>

</div>

<!-- ================= SCREEN 3 ================= -->

<div class="screen hidden" id="screen3">

  <div class="banner">
    Happy Birthday Priii 🎂
  </div>

  <div class="cake" id="cake">
    🎂
  </div>

  <button class="btn" id="cakeBtn" onclick="cutCake()">
    Blow Candles 🕯️
  </button>

</div>

<!-- ================= SCREEN 4 ================= -->

<div class="screen hidden" id="screen4">

  <div class="letter">

    <h2>Dear Priii 💖</h2>

    <br>

    <p>
      You are one of the sweetest people in my life ✨
    </p>

    <br>

    <button class="btn" onclick="openGallery()">
      Open Surprise 💕
    </button>

  </div>

</div>

<!-- ================= GALLERY ================= -->

<div class="screen hidden" id="galleryScreen">

  <div class="gallery-box">

    <img id="galleryImage" src="IMG_8488.JPG">

    <div class="gallery-buttons">

      <button class="arrow-btn" onclick="prevImage()">
        ⬅
      </button>

      <button class="arrow-btn" onclick="nextImageSlide()">
        ➡
      </button>

    </div>

    <div class="photo-count" id="photoCount">
      1 / 10
    </div>

    <br>

    <button class="btn" onclick="openGreetingCard()">
      Open Greeting Card 💌
    </button>

  </div>

</div>

<!-- ================= GREETING CARD ================= -->

<div class="screen hidden" id="greetingScreen">

  <div class="greeting-card">

    <h1 class="greeting-title">
      For Priii 💖
    </h1>

    <div class="typing-text" id="typingText"></div>

    <br><br>

    <button class="btn" onclick="showPopup()">
      Finish Surprise 🎉
    </button>

  </div>

</div>

<!-- ================= POPUP ================= -->

<div id="popup">

  <div class="popup-box">

    <h1>🎉 Thank You Priii 💖</h1>

    <br>

    <p>
      Stay happy and keep smiling forever 🌸
    </p>

    <br><br>

    <button class="btn" onclick="closePopup()">
      Close 💕
    </button>

  </div>

</div>

<!-- ================= MUSIC ================= -->

<audio id="music" loop>
  <source src="birthday.mp3" type="audio/mpeg">
</audio>

<script>

/* ================= STARS ================= */

for(let i=0;i<120;i++){

  let star=document.createElement("div");

  star.classList.add("star");

  let size=Math.random()*3+1;

  star.style.width=size+"px";
  star.style.height=size+"px";

  star.style.left=Math.random()*100+"%";
  star.style.top=Math.random()*100+"%";

  star.style.setProperty("--d",(Math.random()*3+1)+"s");

  document.getElementById("stars").appendChild(star);
}

/* ================= FALLING WORDS ================= */

const words=["Happy","Birthday","Priii","🎂","🎉","💖","✨"];

function dropWord(){

  let el=document.createElement("div");

  el.classList.add("drop");

  el.innerHTML=words[Math.floor(Math.random()*words.length)];

  el.style.left=Math.random()*100+"vw";

  el.style.fontSize=(20+Math.random()*40)+"px";

  el.style.color=
  ["#ff5db1","#ffd166","#9b5cff","#ffffff"]
  [Math.floor(Math.random()*4)];

  el.style.animationDuration=(3+Math.random()*4)+"s";

  document.getElementById("dropping-text")
  .appendChild(el);

  setTimeout(()=>{
    el.remove();
  },7000);
}

let dropInt=setInterval(dropWord,300);

/* ================= COUNTDOWN ================= */

let count=5;

let timer=document.getElementById("timer");

let countdown=setInterval(()=>{

  count--;

  timer.innerHTML=count<10?"0"+count:count;

  if(count<=0){

    clearInterval(countdown);
    clearInterval(dropInt);

    setTimeout(()=>{

      document.getElementById("screen1")
      .classList.add("hidden");

      document.getElementById("screen2")
      .classList.remove("hidden");

    },500);
  }

},1000);

/* ================= MESSAGE SLIDER ================= */

const messages=[

"Our bond in three words — Sweet, Loyal & My Rock 💖",

"The vibe between us? Sweet & Warm ✨",

"You deserve all the happiness in the world 🎉"

];

let current=0;

function nextMessage(){

  current++;

  if(current<messages.length){

    document.getElementById("msg")
    .innerHTML=messages[current];

    let dots=document.querySelectorAll(".dot");

    dots.forEach(dot=>{
      dot.classList.remove("active");
    });

    dots[current].classList.add("active");

  }else{

    document.getElementById("screen2")
    .classList.add("hidden");

    document.getElementById("screen3")
    .classList.remove("hidden");

    document.getElementById("music").play();
  }
}

/* ================= CAKE ================= */

let stage=0;

function cutCake(){

  let cake=document.getElementById("cake");

  let btn=document.getElementById("cakeBtn");

  if(stage===0){

    cake.innerHTML="🕯️";

    setTimeout(()=>{
      cake.innerHTML="🎂";
    },700);

    btn.innerHTML="I Have Something Special For You 💕";

    stage=1;

  }else{

    document.getElementById("screen3")
    .classList.add("hidden");

    document.getElementById("screen4")
    .classList.remove("hidden");
  }
}

/* ================= OPEN GALLERY ================= */

function openGallery(){

  document.getElementById("screen4")
  .classList.add("hidden");

  document.getElementById("galleryScreen")
  .classList.remove("hidden");
}

/* ================= PHOTOS ================= */

const photos=[

"IMG_8488.JPG",
"IMG_8489.JPG",
"IMG_8490.JPG",
"IMG_8492.JPG",
"IMG_8493.JPG",
"IMG_8494.JPG",
"IMG_8495.JPG",
"IMG_8496.JPG",
"IMG_8497.JPG",
"IMG_8498.JPG"

];

window.onload=()=>{

  photos.forEach(src=>{

    const img=new Image();

    img.src=src;
  });
};

let currentPhoto=0;

function nextImageSlide(){

  if(currentPhoto < photos.length-1){

    currentPhoto++;

    updateGallery();
  }
}

function prevImage(){

  if(currentPhoto > 0){

    currentPhoto--;

    updateGallery();
  }
}

function updateGallery(){

  const image=document.getElementById("galleryImage");

  image.style.opacity="0.3";

  const newImg=new Image();

  newImg.src=photos[currentPhoto];

  newImg.onload=()=>{

    image.src=newImg.src;

    image.style.opacity="1";
  };

  document.getElementById("photoCount")
  .innerHTML=(currentPhoto+1)+" / 10";
}

/* ================= GREETING CARD ================= */

const greetingMessage = `You are Sweet, Loyal, My rock, and I'm so grateful to have you in my life.

You bring so much warmth and sweetness into my life. Every moment with you is precious.

On your special day, I wish you all the happiness, love, and joy that you deserve.

May this year bring you countless beautiful moments and wonderful memories.

Here's to celebrating you today and always!

With love and best wishes,
Your Special Sl 💖`;

function openGreetingCard(){

  document.getElementById("galleryScreen")
  .classList.add("hidden");

  document.getElementById("greetingScreen")
  .classList.remove("hidden");

  startTypingEffect();
}

function startTypingEffect(){

  const textElement =
  document.getElementById("typingText");

  textElement.innerHTML = "";

  let i = 0;

  const speed = 35;

  function typing(){

    if(i < greetingMessage.length){

      textElement.innerHTML += greetingMessage.charAt(i);

      i++;

      setTimeout(typing, speed);
    }
  }

  typing();
}

/* ================= POPUP ================= */

function showPopup(){

  document.getElementById("greetingScreen")
  .classList.add("hidden");

  document.getElementById("popup")
  .classList.add("show");
}

function closePopup(){

  document.getElementById("popup")
  .classList.remove("show");
}

/* ================= FLOAT HEARTS ================= */

setInterval(()=>{

  let heart=document.createElement("div");

  heart.innerHTML="💖";

  heart.style.position="fixed";

  heart.style.left=Math.random()*100+"vw";

  heart.style.bottom="-20px";

  heart.style.fontSize=(20+Math.random()*30)+"px";

  heart.style.animation=
  "floatHeart 5s linear forwards";

  document.body.appendChild(heart);

  setTimeout(()=>{
    heart.remove();
  },5000);

},700);

</script>

</body>
</html>
